<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="ui/settings.css" />
</head>
<body>
  <div class="container">
    <header><h1>Settings</h1></header>

    <section>
      <h3>Groq API Key (required for quiz solving)</h3>
      <div class="setting-item" style="flex-direction:column;align-items:stretch;gap:4px;">
        <label for="groqApiKey">API Key</label>
        <input type="password" id="groqApiKey" placeholder="gsk_..." style="width:100%;" />
        <div class="note" style="font-size:11px;color:#94a3b8;">Get a free key at <a href="https://console.groq.com/keys" target="_blank" style="color:#60a5fa;">console.groq.com</a></div>
      </div>
      <div class="setting-item">
        <label>Model</label>
        <span style="color:#94a3b8;">llama-3.3-70b-versatile (hardcoded)</span>
      </div>
    </section>

    <button id="saveBtn">Save</button>
    <div id="status"></div>
  </div>

  <script src="scripts/settings.js"></script>
</body>
</html>
